use_default_settings: true
server:
  secret_key: "change-me-iris-secret"
  limiter: false
  image_proxy: false
  default_http_headers:
    X-Content-Type-Options: nosniff
search:
  formats:
    - html
    - json
  safe_search: 0
  autocomplete: ""
  default_lang: ""
enabled_plugins: []
outgoing:
  request_timeout: 6.0
  max_request_timeout: 10.0
  pool_connections: 10
  pool_maxsize: 20
engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
